[pytest]
# Pytest configuration for CRM test suite

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings

# Markers for test organization
markers =
    unit: Unit tests (fast, no database)
    integration: Integration tests (API + database)
    security: Security and isolation tests
    slow: Slow tests (may take >5 seconds)
    xfail: Tests expected to fail (known issues)

# Coverage options (when running with --cov)
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
